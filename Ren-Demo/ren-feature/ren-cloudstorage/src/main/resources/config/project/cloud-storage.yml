# 统一后的云存储配置
cloud:
  storage:
    # 云存储厂商名称 (aliyun, qiniu, qcloud等)
    vendor: aliyun

    # 阿里云OSS相关配置
    aliyun:
      # 访问密钥ID (请替换为您的实际值)
      access-key-id: ${ACCESS_KEY_ID}
      # 访问密钥 (请替换为您的实际值)
      access-key-secret: ${ACCESS_KEY_SECRET}
      # OSS存储桶名称 (请替换为您的实际值)
      bucket-name: ${BUCKET_NAME}
      # OSS服务端点 (请替换为您的实际端点)
      endpoint: https://oss-cn-region.aliyuncs.com
      # 图片上传路径
      image-upload-path: images
      # OSS文件访问路径前缀
      image_oss_path_read: https://${BUCKET_NAME}.oss-cn-region.aliyuncs.com